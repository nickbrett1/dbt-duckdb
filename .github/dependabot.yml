version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      dbt-core-sqlparse:
        patterns:
          - "dbt-core"
          - "sqlparse"
      pydantic:
        patterns:
          - "pydantic"
          - "pydantic-core"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
